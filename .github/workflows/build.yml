name: Build Spinlist Music Manager

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build: npm run dist:mac -- --publish never
          - os: windows-latest
            build: npm run dist:win -- --publish never
    runs-on: ${{ matrix.os }}
    steps:
      - name: Get the code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build the app
        run: ${{ matrix.build }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Collect the installers
        uses: actions/upload-artifact@v4
        with:
          name: spinlist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all built installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
