name: Build Spinlist Music Manager

# When this runs:
#  - Automatically whenever you push a tag that starts with "v" (e.g. v1.2.0)
#  - Or manually, any time, from the Actions tab ("Run workflow")
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:      # lets you trigger it by hand from the GitHub website

jobs:
  build:
    # Build on BOTH a Mac runner and a Windows runner at the same time.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build: npm run dist:mac
          - os: windows-latest
            build: npm run dist:win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build the app
        run: ${{ matrix.build }}
        env:
          # Don't try to code-sign / notarise (we have no certificates). Build unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Collect the installers
        # Grab just the finished installer files, not the loose build folders.
        uses: actions/upload-artifact@v4
        with:
          name: spinlist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: ignore

  # After both builds finish, attach all the installers to a GitHub Release.
  release:
    needs: build
    runs-on: ubuntu-latest
    # Only make a Release when triggered by a version tag (not manual test runs).
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all built installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish them to a Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: false
          generate_release_notes: true
